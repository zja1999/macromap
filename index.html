<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Macro Map — eat well, wherever you are</title>
  <meta name="description" content="Find fast-food & restaurant menu items near you that fit your calorie and macro goals." />

  <!-- PWA / installable -->
  <link rel="manifest" href="manifest.webmanifest?v=4" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Macro Map" />

  <!-- Leaflet (map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <link rel="stylesheet" href="css/styles.css?v=10" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <path d="M16 2C9.9 2 5 6.7 5 12.6 5 20.3 16 30 16 30s11-9.7 11-17.4C27 6.7 22.1 2 16 2z" fill="var(--accent)"/>
          <circle cx="16" cy="12.5" r="5" fill="#fff"/>
          <path d="M13.6 10v5M16 9.6v5.4M18.4 10v5" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </span>
      <div>
        <div class="brand-name">Macro Map</div>
        <div class="brand-tag">eat well, wherever you are</div>
      </div>
    </div>
    <div class="topbar-right">
      <nav id="nav" class="nav" aria-label="Primary"></nav>
      <button id="install-btn" class="btn small install-btn hidden" type="button" aria-label="Install app">⬇ Install<span class="ib-extra"> app</span></button>
      <div id="account" class="account"></div>
    </div>
  </header>

  <main class="container">
    <section id="view-profile"   class="view"></section>
    <section id="view-discover"  class="view hidden"></section>
    <section id="view-menu"      class="view hidden"></section>
    <section id="view-recommend" class="view hidden"></section>
    <section id="view-tracker"   class="view hidden"></section>
    <section id="view-requests"  class="view hidden"></section>
    <section id="view-admin"     class="view hidden"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <footer class="site-foot">
    <button id="feedback-link" class="link-btn" type="button">💬 Send feedback</button>
    <span>Macro Map · nutrition figures are approximate and for guidance only.</span>
    <span>Map data © OpenStreetMap contributors · search via Nominatim &amp; Overpass.</span>
  </footer>

  <!-- Supabase client (optional cloud accounts) — defines window.supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- App scripts, loaded in dependency order (no build step required).
       The ?v= query busts stale browser caches after a deploy — bump it when
       you ship significant JS/CSS changes. -->
  <script src="js/config.js?v=6"></script>
  <script src="js/nutrition-data.js?v=5"></script>
  <script src="js/storage.js?v=5"></script>
  <script src="js/macros.js?v=5"></script>
  <script src="js/recommend.js?v=4"></script>
  <script src="js/map.js?v=4"></script>
  <script src="js/ui.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script src="js/data-source.js?v=10"></script>
  <script src="js/app.js?v=16"></script>
  <script src="js/admin-feedback-delete.js?v=2"></script>
</body>
</html>
